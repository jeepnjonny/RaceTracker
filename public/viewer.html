<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RaceTracker — Live View</title>
<base href="/RaceTracker/">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="css/theme.css">
<link id="rt-theme-css" rel="stylesheet">
<style>
  html, body { max-width: 100vw; overflow-x: hidden; }
  body { overflow: hidden; }

  /* ── Topbar ── */
  #viewer-topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 6px 10px; display: flex; align-items: center; gap: 8px;
    flex-shrink: 0; flex-wrap: nowrap; min-width: 0;
  }
  #viewer-topbar h1 {
    font-size: 14px; font-weight: bold; letter-spacing: 2px;
    color: var(--accent); white-space: nowrap; flex-shrink: 0;
  }
  #vw-race-pill { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 1; }
  #vw-clock { font-size: 18px; font-weight: bold; color: var(--accent2); letter-spacing: 2px; margin-left: auto; flex-shrink: 0; white-space: nowrap; }

  /* ── Main layout ── */
  #viewer-main { display: flex; flex: 1; overflow: hidden; min-width: 0; }
  #viewer-map-wrap { flex: 1; position: relative; min-width: 0; }
  #viewer-map { width: 100%; height: 100%; }

  /* ── Leaderboard sidebar ── */
  #viewer-lb-wrap {
    width: clamp(260px, 30vw, 360px);
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  #viewer-sort-bar { display: flex; gap: 4px; padding: 6px 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .v-sort-btn { font-size: 11px; padding: 2px 8px; }
  .v-sort-btn.active { border-color: var(--accent); color: var(--accent); }

  /* Leaderboard grid — named areas so responsive override is clean */
  .v-lb-cols { grid-template-columns: 22px 28px 1fr 44px 50px 72px; }
  .v-lb-head {
    font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase;
    display: grid; gap: 4px; padding: 4px 8px;
    border-bottom: 1px solid var(--border); background: var(--surface2); flex-shrink: 0;
  }
  #viewer-lb-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .v-lb-row {
    display: grid; gap: 4px; padding: 5px 8px;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .v-lb-row.alert-row { animation: blink 1.2s infinite; }

  /* ── Mobile: stack map & leaderboard ── */
  #view-toggle { display: none; }

  @media (max-width: 700px) {
    #viewer-topbar h1 { display: none; }
    #vw-clock { font-size: 14px; letter-spacing: 1px; }
    #viewer-lb-wrap { display: none; width: 100%; border-left: none; flex-shrink: unset; }
    #view-toggle { display: flex; }
    body.lb-mode #viewer-map-wrap { display: none; }
    body.lb-mode #viewer-lb-wrap { display: flex; width: 100%; }
    /* Narrower columns on small screens */
    .v-lb-cols { grid-template-columns: 18px 24px 1fr 38px 42px 60px; }
    .v-lb-row, .v-lb-head { padding: 4px 6px; font-size: 12px; gap: 3px; }
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .tracker-icon-alert { animation: blink 1s infinite; }
  .leaflet-div-icon { background: none; border: none; }
  /* Leaflet controls themed to match app */
  .leaflet-control-layers {
    background: var(--surface) !important; border: 1px solid var(--border) !important;
    border-radius: 6px !important; box-shadow: none !important;
    color: var(--text) !important; font-family: var(--font) !important; font-size: 12px !important;
  }
  .leaflet-control-layers-toggle { background-color: var(--surface2) !important; }
  .leaflet-control-layers-expanded { padding: 8px 10px !important; }
  .leaflet-control-layers-separator { border-top: 1px solid var(--border) !important; }
  .leaflet-control-layers label { display: flex !important; align-items: center !important; gap: 6px !important; color: var(--text2) !important; font-size: 12px !important; margin: 2px 0 !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important; border-color: var(--border) !important;
    color: var(--text) !important; font-family: var(--font) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }
</style>
</head>
<body>
<div id="viewer-topbar">
  <h1>&#9654; RaceTracker</h1>
  <div class="pill pill-idle" id="vw-race-pill">LOADING...</div>
  <div id="vw-clock" style="font-size:18px;font-weight:bold;color:var(--accent2);letter-spacing:2px;margin-left:auto">--:--:--</div>
  <select id="vw-base-layer-sel" onchange="VW.setViewerBaseLayer(this.value)" style="font-size:12px;padding:4px 6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;font-family:var(--font);flex-shrink:0;max-width:80px;margin-left:auto">
    <option value="Topo">Topo</option>
    <option value="Satellite">Satellite</option>
    <option value="Street">Street</option>
    <option value="Dark">Dark</option>
  </select>
  <div id="view-toggle" style="gap:6px">
    <button onclick="VW.toggleView()" id="vw-toggle-btn">LEADERBOARD</button>
  </div>
</div>
<div id="viewer-main">
  <div id="viewer-map-wrap">
    <div id="viewer-map"></div>
  </div>
  <div id="viewer-lb-wrap">
    <div id="viewer-sort-bar">
      <span style="font-size:11px;color:var(--text3);align-self:center">SORT:</span>
      <button class="v-sort-btn active" data-sort="position" onclick="VW.setSort('position')">POSITION</button>
      <button class="v-sort-btn" data-sort="bib" onclick="VW.setSort('bib')">BIB</button>
      <button class="v-sort-btn" data-sort="pace" onclick="VW.setSort('pace')">PACE</button>
      <button class="v-sort-btn" data-sort="name" onclick="VW.setSort('name')">NAME</button>
      <button class="v-sort-btn" data-sort="heat" onclick="VW.setSort('heat')">HEAT</button>
    </div>
    <div class="v-lb-head v-lb-cols">
      <span>#</span><span>BIB</span><span>NAME</span><span>PROG</span><span>PACE</span><span>LAST AID</span>
    </div>
    <div id="viewer-lb-body"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="js/common.js"></script>
<script src="js/viewer.js"></script>
</body>
</html>
