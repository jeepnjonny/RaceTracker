<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RaceTracker — Admin</title>
<base href="/RaceTracker/">
<link rel="stylesheet" href="css/theme.css">
<style>
  body { overflow: auto; flex-direction: column; height: auto; min-height: 100vh; }
  #main { flex-direction: column; overflow: visible; flex: none; }
  .admin-wrap { max-width: 960px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .admin-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .admin-tab {
    padding: 8px 16px; background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text2); font-size: 11px; letter-spacing: 1px; border-radius: 0;
    cursor: pointer; transition: all .15s;
  }
  .admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .admin-tab:hover:not(.active) { color: var(--text); background: var(--surface2); }
  .admin-section { display: none; }
  .admin-section.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .card h3 { font-size: 11px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }
  .race-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; cursor: pointer; }
  .race-card:hover { border-color: var(--accent); }
  .race-card.active-race { border-color: var(--accent2); }
  .infra-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px;
    border-bottom: 1px solid var(--border); font-size: 11px; }
  .infra-node { color: var(--accent4); font-weight: bold; min-width: 100px; }
  .icon-preview { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; }
  @media (max-width: 700px) {
    #admin-content > div[style*="grid-template-columns:300px"] {
      display: flex !important; flex-direction: column;
    }
  }
</style>
</head>
<body>
<div id="topbar">
  <h1>&#9654; RaceTracker</h1>
  <div class="pill pill-idle" id="active-race-pill">NO ACTIVE RACE</div>
  <div class="pill pill-idle" id="mqtt-pill">MQTT</div>
  <div id="topbar-right">
    <button onclick="window.location.href=RT.BASE+'operator.html'">OPERATOR VIEW</button>
    <button onclick="RT.logout()">LOGOUT</button>
  </div>
</div>
<div id="main">
  <div class="admin-wrap">
    <div class="admin-tabs" id="admin-tabs"></div>
    <div id="admin-content"></div>
  </div>
</div>

<!-- Race Edit Modal -->
<div class="modal-bg hidden" id="race-modal">
  <div class="modal modal-wide">
    <h2 id="race-modal-title">NEW RACE</h2>
    <div class="form-row">
      <div class="form-group"><label>RACE NAME</label><input id="rm-name"></div>
      <div class="form-group"><label>DATE</label><input type="date" id="rm-date"></div>
    </div>
    <div class="section-header">RACE SETTINGS</div>
    <div class="form-row">
      <div class="form-group">
        <label>COURSE</label>
        <select id="rm-course-id"><option value="">— None —</option></select>
      </div>
      <div class="form-group">
        <label>FORMAT</label>
        <select id="rm-race-format">
          <option value="point_to_point">Point-to-Point</option>
          <option value="out_and_back">Out &amp; Back</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>TIME FORMAT</label>
        <select id="rm-time-format"><option value="12h">12-Hour</option><option value="24h" selected>24-Hour</option></select>
      </div>
    </div>
    <div class="section-header">ALERTS &amp; AUTOMATION</div>
    <div style="display:flex;flex-direction:column;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px">
      <div style="display:flex;align-items:center;gap:8px;padding:4px 2px">
        <input type="checkbox" id="rm-feat-missing" checked>
        <label for="rm-feat-missing" style="flex:1;font-size:12px;cursor:pointer">Missing timer</label>
        <input id="rm-missing-timer" type="number" min="1" value="60" style="width:64px;text-align:right">
        <span style="font-size:11px;color:var(--text3);min-width:24px">min</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:4px 2px">
        <input type="checkbox" id="rm-feat-auto-log" checked>
        <label for="rm-feat-auto-log" style="flex:1;font-size:12px;cursor:pointer">Auto-log aid stations (geofence)</label>
        <input id="rm-geofence" type="number" min="1" value="15" style="width:64px;text-align:right">
        <span style="font-size:11px;color:var(--text3);min-width:24px">m</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:4px 2px">
        <input type="checkbox" id="rm-feat-auto-start" checked>
        <label for="rm-feat-auto-start" style="flex:1;font-size:12px;cursor:pointer">Auto-start / finish participants</label>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:4px 2px">
        <input type="checkbox" id="rm-feat-off-course" checked>
        <label for="rm-feat-off-course" style="flex:1;font-size:12px;cursor:pointer">Off-course alert</label>
        <input id="rm-off-course" type="number" min="1" value="100" style="width:64px;text-align:right">
        <span style="font-size:11px;color:var(--text3);min-width:24px">m</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:4px 2px">
        <input type="checkbox" id="rm-feat-stopped" checked>
        <label for="rm-feat-stopped" style="flex:1;font-size:12px;cursor:pointer">Stopped alert</label>
        <input id="rm-stopped" type="number" min="1" value="10" style="width:64px;text-align:right">
        <span style="font-size:11px;color:var(--text3);min-width:24px">min</span>
      </div>
    </div>
    <div class="section-header">FEATURES</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      <div class="checkbox-row"><input type="checkbox" id="rm-messaging"><label for="rm-messaging">Operator messaging</label></div>
      <div class="checkbox-row"><input type="checkbox" id="rm-viewer-map" checked><label for="rm-viewer-map">Viewer map</label></div>
      <div class="checkbox-row"><input type="checkbox" id="rm-leaderboard" checked><label for="rm-leaderboard">Viewer leaderboard</label></div>
      <div class="checkbox-row"><input type="checkbox" id="rm-weather"><label for="rm-weather">Weather overlay</label></div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal('race-modal')">CANCEL</button>
      <button class="primary" onclick="saveRace()">SAVE</button>
    </div>
  </div>
</div>

<!-- User Modal -->
<div class="modal-bg hidden" id="user-modal">
  <div class="modal">
    <h2 id="user-modal-title">NEW USER</h2>
    <div class="form-group"><label>USERNAME</label><input id="um-username"></div>
    <div class="form-group"><label>PASSWORD <span class="text-dim">(leave blank to keep current)</span></label><input type="password" id="um-password"></div>
    <div class="form-group">
      <label>ROLE</label>
      <select id="um-role"><option value="operator">Operator</option><option value="admin">Admin</option></select>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal('user-modal')">CANCEL</button>
      <button class="primary" onclick="saveUser()">SAVE</button>
    </div>
  </div>
</div>

<!-- Heat Modal -->
<div class="modal-bg hidden" id="heat-modal">
  <div class="modal">
    <h2 id="heat-modal-title">NEW HEAT</h2>
    <div class="form-group"><label>HEAT NAME</label><input id="hm-name" placeholder="e.g. Wave 1, Elite"></div>
    <div class="form-row">
      <div class="form-group">
        <label>COLOR</label>
        <input type="color" id="hm-color" value="#58a6ff" style="height:34px;padding:2px">
      </div>
      <div class="form-group">
        <label>ICON SHAPE</label>
        <select id="hm-shape">
          <option value="circle">Circle</option><option value="triangle">Triangle</option>
          <option value="square">Square</option><option value="diamond">Diamond</option>
          <option value="star">Star</option><option value="pentagon">Pentagon</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>PREVIEW</label><div id="hm-preview" style="height:30px;display:flex;align-items:center;gap:6px"></div></div>
    <div class="modal-footer">
      <button onclick="closeModal('heat-modal')">CANCEL</button>
      <button class="primary" onclick="saveHeat()">SAVE</button>
    </div>
  </div>
</div>

<!-- Personnel Modal -->
<div class="modal-bg hidden" id="personnel-modal">
  <div class="modal">
    <h2 id="personnel-modal-title">NEW PERSONNEL</h2>
    <div class="form-group"><label>NAME</label><input id="pm-name"></div>
    <div class="form-group">
      <label>STATION</label>
      <select id="pm-station-id"><option value="">— Unassigned —</option></select>
    </div>
    <div class="form-group"><label>TRACKER ID <span class="text-dim">(node ID, longname, or shortname)</span></label><input id="pm-tracker-id" placeholder="leave blank if none"></div>
    <div class="form-group"><label>PHONE</label><input id="pm-phone" placeholder="optional"></div>
    <div class="modal-footer">
      <button onclick="closeModal('personnel-modal')">CANCEL</button>
      <button class="primary" onclick="savePersonnel()">SAVE</button>
    </div>
  </div>
</div>

<!-- Station Modal -->
<div class="modal-bg hidden" id="station-modal">
  <div class="modal">
    <h2 id="station-modal-title">NEW STATION</h2>
    <div class="form-group"><label>NAME</label><input id="sm-name"></div>
    <div class="form-row">
      <div class="form-group">
        <label>TYPE</label>
        <select id="sm-type">
          <option value="aid">Aid Station</option>
          <option value="checkpoint">Checkpoint</option>
          <option value="start">Start</option>
          <option value="finish">Finish</option>
          <option value="start_finish">Start/Finish (Out &amp; Back)</option>
          <option value="turnaround">Turnaround (Out &amp; Back)</option>
        </select>
      </div>
      <div class="form-group"><label>CUTOFF TIME (HH:MM)</label><input id="sm-cutoff" placeholder="optional"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>LATITUDE</label><input id="sm-lat" type="number" step="any" placeholder="e.g. 35.1234"></div>
      <div class="form-group"><label>LONGITUDE</label><input id="sm-lon" type="number" step="any" placeholder="e.g. -82.5678"></div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal('station-modal')">CANCEL</button>
      <button class="primary" onclick="saveStation()">SAVE</button>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
