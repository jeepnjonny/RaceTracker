<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RaceTracker — Login</title>
<base href="/RaceTracker/">
<link rel="stylesheet" href="css/theme.css">
</head>
<body style="overflow:auto">
<div class="login-wrap">
  <div class="login-box">
    <h1>&#9654; RaceTracker</h1>
    <p>Race Safety &amp; Tracking System</p>
    <div class="form-group">
      <label>USERNAME</label>
      <input type="text" id="username" autocomplete="username" autofocus>
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" id="password" autocomplete="current-password">
    </div>
    <button class="primary w100" onclick="login()" style="margin-top:4px">SIGN IN</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>
<script>
const _base = (() => { const s = location.pathname.split('/')[1]; return s && !s.includes('.') ? '/' + s + '/' : '/'; })();
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  document.getElementById('login-error').textContent = '';
  if (!username || !password) {
    document.getElementById('login-error').textContent = 'Enter username and password.';
    return;
  }
  try {
    const res = await fetch(_base + 'api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const json = await res.json();
    if (!json.ok) { document.getElementById('login-error').textContent = json.error; return; }
    const role = json.data.role;
    window.location.href = _base + (role === 'admin' ? 'admin.html' : 'operator.html');
  } catch (e) {
    document.getElementById('login-error').textContent = 'Connection error.';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
fetch(_base + 'api/auth/me').then(r => r.json()).then(j => {
  if (j.ok) window.location.href = _base + (j.data.role === 'admin' ? 'admin.html' : 'operator.html');
}).catch(() => {});
</script>
</body>
</html>
