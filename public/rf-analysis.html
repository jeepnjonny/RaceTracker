<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RaceTracker — RF Analysis</title>
<base href="/RaceTracker/">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="css/theme.css">
<link id="rt-theme-css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<style>
  body { overflow: hidden; }
  #sidebar {
    width: 300px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar-body { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
  #map-wrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  .ctrl-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; }
  .ctrl-title { font-size: 11px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }

  .src-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .src-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .src-label { flex: 1; font-size: 14px; }
  .src-count { font-size: 13px; color: var(--text3); }

  .metric-btn { flex: 1; padding: 5px 4px; font-size: 13px; text-align: center; border-radius: 4px; cursor: pointer;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
  .metric-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: bold; }

  .node-row { display: flex; align-items: center; gap: 6px; padding: 5px 4px;
    border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; }
  .node-row:hover { background: var(--surface2); }
  .node-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .node-pkt  { font-size: 12px; color: var(--text3); white-space: nowrap; }

  #loading-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 2000; font-size: 18px; letter-spacing: 2px; color: var(--text);
  }
  .stat-row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
  .stat-val  { color: var(--accent); font-weight: bold; }

  .slider-row { display: flex; align-items: center; gap: 8px; }
  .slider-row label { font-size: 13px; color: var(--text2); white-space: nowrap; }
  .slider-row input { flex: 1; }
  .slider-row span { font-size: 13px; color: var(--accent); min-width: 32px; text-align: right; }
</style>
</head>
<body>
<div id="topbar">
  <h1>&#9654; RF Analysis</h1>
  <div id="topbar-right">
    <select id="theme-sel" onchange="RT.applyTheme(this.value)" style="font-size:14px;padding:4px 6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;font-family:var(--font)">
      <option value="dark">Dark</option><option value="amber">Amber</option>
      <option value="eclipse">Eclipse</option><option value="high-vis-dark">High-Vis Dark</option>
      <option value="high-vis-day">High-Vis Day</option>
      <option value="midnight-purple">Midnight Purple</option>
      <option value="terminal-green">Terminal Green</option>
    </select>
    <button onclick="window.location.href=RT.BASE+'admin.html'">&#8592; ADMIN</button>
    <button onclick="RT.logout()">LOGOUT</button>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-body">

      <!-- Race selector -->
      <div class="ctrl-block">
        <div class="ctrl-title">Race</div>
        <select id="race-sel" style="width:100%" onchange="RF.selectRace(this.value)">
          <option value="">Loading…</option>
        </select>
      </div>

      <!-- Technology filter -->
      <div class="ctrl-block">
        <div class="ctrl-title">Technology</div>
        <div id="src-list"></div>
      </div>

      <!-- Metric -->
      <div class="ctrl-block">
        <div class="ctrl-title">Heatmap Layer</div>
        <div style="display:flex;gap:4px">
          <button class="metric-btn active" onclick="RF.setMetric('density')" id="btn-density">DENSITY</button>
          <button class="metric-btn" onclick="RF.setMetric('snr')" id="btn-snr">SNR</button>
          <button class="metric-btn" onclick="RF.setMetric('rssi')" id="btn-rssi">RSSI</button>
        </div>
      </div>

      <!-- Heatmap tuning -->
      <div class="ctrl-block">
        <div class="ctrl-title">Display</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="slider-row">
            <label>Opacity</label>
            <input type="range" min="10" max="100" value="70" id="sl-opacity" oninput="RF.setOpacity(this.value)">
            <span id="lbl-opacity">70%</span>
          </div>
          <div class="slider-row">
            <label>Radius</label>
            <input type="range" min="10" max="60" value="25" id="sl-radius" oninput="RF.setRadius(this.value)">
            <span id="lbl-radius">25</span>
          </div>
          <div class="slider-row">
            <label>Blur</label>
            <input type="range" min="5" max="40" value="15" id="sl-blur" oninput="RF.setBlur(this.value)">
            <span id="lbl-blur">15</span>
          </div>
        </div>
      </div>

      <!-- Summary stats -->
      <div class="ctrl-block" id="stats-block">
        <div class="ctrl-title">Summary</div>
        <div id="stats-body"><span class="text-dim" style="font-size:13px">No data</span></div>
      </div>

      <!-- Node list -->
      <div class="ctrl-block">
        <div class="ctrl-title">Nodes / Trackers</div>
        <div id="node-list"><span class="text-dim" style="font-size:13px">No data</span></div>
      </div>

    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="loading-overlay" style="display:none">LOADING…</div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/rf-analysis.js"></script>
</body>
</html>
