<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RaceTracker — Operator</title>
<base href="/RaceTracker/">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="css/theme.css">
<style>
  .tracker-icon-alert { animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .leaflet-div-icon { background: none; border: none; }
  #map-overlay {
    position: absolute; top: 10px; right: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; z-index: 1000;
    font-size: 11px; min-width: 140px;
    color: var(--text); font-family: var(--font);
  }
  #map-overlay h3 { font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .stat-line { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 2px; }
  .stat-val { color: var(--accent); font-weight: bold; }
  /* Leaflet controls themed to match app */
  .leaflet-control-layers {
    background: var(--surface) !important; border: 1px solid var(--border) !important;
    border-radius: 6px !important; box-shadow: none !important;
    color: var(--text) !important; font-family: var(--font) !important; font-size: 11px !important;
  }
  .leaflet-control-layers-toggle { background-color: var(--surface2) !important; }
  .leaflet-control-layers-expanded { padding: 8px 10px !important; }
  .leaflet-control-layers-separator { border-top: 1px solid var(--border) !important; }
  .leaflet-control-layers label { color: var(--text2) !important; font-size: 11px !important; margin: 2px 0 !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important; border-color: var(--border) !important;
    color: var(--text) !important; font-family: var(--font) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }
  #right-panel { width: 340px; }
  #right-panel .panel-content { flex: 1; overflow-y: auto; padding: 10px; }
  .info-field { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
  .info-field .lbl { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
  .info-field .val { font-size: 12px; color: var(--text); }
  .msg-bubble-out { background: rgba(88,166,255,.12); border: 1px solid rgba(88,166,255,.3); border-radius: 6px 6px 0 6px; padding: 5px 8px; margin: 4px 0; align-self: flex-end; }
  .msg-bubble-in  { background: rgba(63,185,80,.10); border: 1px solid rgba(63,185,80,.3); border-radius: 6px 6px 6px 0; padding: 5px 8px; margin: 4px 0; align-self: flex-start; }
  .msg-wrap { display: flex; flex-direction: column; gap: 2px; padding: 6px; overflow-y: auto; flex: 1; }
  #sort-bar { display: flex; gap: 4px; padding: 6px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .sort-btn { font-size: 10px; padding: 2px 8px; }
  .sort-btn.active { border-color: var(--accent); color: var(--accent); }
  #leaderboard-body { flex: 1; overflow-y: auto; }
  .lb-row { display: grid; grid-template-columns: 28px 30px 1fr 50px 60px 28px; align-items: center;
    gap: 4px; padding: 4px 6px; border-bottom: 1px solid var(--border); font-size: 11px; cursor: pointer; }
  .lb-row:hover { background: var(--surface2); }
  .lb-row.selected { background: rgba(88,166,255,.08); }
  .lb-row.alert-row { animation: blink 1.2s infinite; }
  .lb-row.missing-row { opacity: 0.45; }
  .lb-head { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase;
    display: grid; grid-template-columns: 28px 30px 1fr 50px 60px 28px;
    gap: 4px; padding: 4px 6px; border-bottom: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; }
  #station-info { padding: 10px; }
  .alert-badge { background: rgba(247,129,102,.15); border: 1px solid var(--accent3); color: var(--accent3);
    border-radius: 4px; padding: 3px 8px; font-size: 11px; margin: 2px 0; display: flex; gap: 6px; align-items: center; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>&#9654; RaceTracker</h1>
  <div class="pill pill-idle" id="race-pill">NO RACE</div>
  <div class="pill pill-idle" id="mqtt-pill">MQTT</div>
  <div class="pill pill-idle" id="aprs-pill">APRS</div>
  <div id="race-clock" style="font-size:18px;font-weight:bold;color:var(--accent2);letter-spacing:2px">--:--:--</div>
  <div id="alert-count" class="pill pill-error hidden">0 ALERTS</div>
  <div id="topbar-right">
    <select id="base-layer-sel" onchange="OP.setBaseLayer(this.value)" style="font-size:11px;padding:4px 6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;font-family:var(--font)">
      <option value="topo">USGS Topo</option>
      <option value="satellite">USGS Satellite</option>
      <option value="osm">OSM Street</option>
      <option value="dark">Dark</option>
    </select>
    <button onclick="window.location.href=RT.BASE+'admin.html'" id="admin-btn" class="hidden">ADMIN</button>
    <button onclick="RT.logout()">LOGOUT</button>
  </div>
</div>

<!-- Setup warning bar -->
<div id="setup-warning" style="display:none;background:rgba(210,153,34,.12);border-bottom:1px solid rgba(210,153,34,.4);padding:5px 14px;font-size:11px;color:#d2993a;display:none;align-items:center;gap:8px;flex-wrap:wrap">
  <span style="font-weight:bold;letter-spacing:1px">&#9888; SETUP INCOMPLETE</span>
  <span id="setup-warning-text"></span>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT: LEADERBOARD -->
  <div class="panel panel-320" style="overflow:hidden">
    <div id="sort-bar">
      <span style="font-size:10px;color:var(--text3);align-self:center">SORT:</span>
      <button class="sort-btn active" data-sort="position" onclick="OP.setSort('position')">POSITION</button>
      <button class="sort-btn" data-sort="bib" onclick="OP.setSort('bib')">BIB</button>
      <button class="sort-btn" data-sort="pace" onclick="OP.setSort('pace')">PACE</button>
      <button class="sort-btn" data-sort="eta" onclick="OP.setSort('eta')">ETA</button>
      <button class="sort-btn" data-sort="name" onclick="OP.setSort('name')">NAME</button>
      <button class="sort-btn" data-sort="heat" onclick="OP.setSort('heat')">HEAT</button>
    </div>
    <div class="lb-head">
      <span>#</span><span>BIB</span><span>NAME</span><span>PROG</span><span>PACE</span><span>&#9889;</span>
    </div>
    <div id="leaderboard-body"></div>
  </div>

  <!-- MAP -->
  <div id="map-container">
    <div id="map"></div>
    <div id="map-overlay">
      <h3>Status</h3>
      <div class="stat-line"><span>Active</span><span class="stat-val" id="stat-active">0</span></div>
      <div class="stat-line"><span>Finished</span><span class="stat-val" id="stat-finished" style="color:var(--accent2)">0</span></div>
      <div class="stat-line"><span>DNF</span><span class="stat-val" id="stat-dnf" style="color:var(--accent3)">0</span></div>
      <div class="stat-line"><span>DNS</span><span class="stat-val" id="stat-dns" style="color:var(--text3)">0</span></div>
      <div style="border-top:1px solid var(--border);margin:6px 0"></div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">TOTAL DIST</div>
      <div class="stat-val" id="stat-dist">—</div>
    </div>
  </div>

  <!-- RIGHT: INFO / MESSAGING PANEL -->
  <div class="panel panel-right" id="right-panel" style="display:flex;flex-direction:column;overflow:hidden">
    <div class="panel-tabs">
      <button class="tab-btn active" onclick="OP.switchRightTab('info')">INFO</button>
      <button class="tab-btn" onclick="OP.switchRightTab('alerts')">ALERTS <span id="alert-tab-count"></span></button>
      <button class="tab-btn" onclick="OP.switchRightTab('msg')">MSG <span id="msg-tab-count"></span></button>
      <button class="tab-btn" onclick="OP.switchRightTab('log')">LOG</button>
    </div>
    <!-- INFO TAB -->
    <div class="tab-content active" id="right-tab-info" style="padding:0;overflow-y:auto">
      <div id="info-panel" style="padding:10px;color:var(--text2);font-size:12px">
        Click a tracker on the map or a row in the leaderboard.
      </div>
    </div>
    <!-- ALERTS TAB -->
    <div class="tab-content" id="right-tab-alerts" style="padding:8px;overflow-y:auto">
      <div id="alerts-list"></div>
    </div>
    <!-- MESSAGING TAB -->
    <div class="tab-content" id="right-tab-msg" style="padding:0;flex-direction:column;overflow:hidden">
      <div style="padding:8px;border-bottom:1px solid var(--border);flex-shrink:0">
        <label>RECIPIENT</label>
        <select id="msg-recipient" style="width:100%"></select>
      </div>
      <div class="msg-wrap" id="msg-thread"></div>
      <div style="padding:8px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0">
        <input id="msg-text" placeholder="Type message..." style="flex:1">
        <button class="primary" onclick="OP.sendMessage()">SEND</button>
      </div>
    </div>
    <!-- LOG TAB -->
    <div class="tab-content" id="right-tab-log" style="padding:0;overflow-y:auto">
      <div id="event-log"></div>
    </div>
  </div>
</div>

<!-- No active race overlay -->
<div id="no-race-overlay" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(13,17,23,.92);align-items:center;justify-content:center;flex-direction:column;gap:16px">
  <div style="font-size:48px;opacity:.3">&#9654;</div>
  <div style="font-size:22px;font-weight:bold;letter-spacing:3px;color:var(--text)">NO ACTIVE RACE</div>
  <div style="font-size:13px;color:var(--text3);letter-spacing:1px">An admin must activate a race before tracking begins.</div>
  <button onclick="window.location.href=RT.BASE+'admin.html'" id="no-race-admin-btn" class="primary hidden" style="margin-top:8px;letter-spacing:1px">GO TO ADMIN</button>
</div>

<!-- Participant Edit Modal -->
<div class="modal-bg hidden" id="edit-modal">
  <div class="modal">
    <h2>EDIT PARTICIPANT</h2>
    <div class="form-row">
      <div class="form-group"><label>BIB</label><input id="em-bib" readonly style="opacity:.6"></div>
      <div class="form-group"><label>NAME</label><input id="em-name"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>STATUS</label>
        <select id="em-status">
          <option value="dns">DNS</option><option value="active">Active</option>
          <option value="dnf">DNF</option><option value="finished">Finished</option>
        </select>
      </div>
      <div class="form-group"><label>TRACKER ID</label><input id="em-tracker"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>HEAT</label><select id="em-heat"></select></div>
      <div class="form-group"><label>CLASS</label><select id="em-class"></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>START TIME</label><input id="em-start" placeholder="HH:MM:SS"></div>
      <div class="form-group"><label>FINISH TIME</label><input id="em-finish" placeholder="HH:MM:SS"></div>
    </div>
    <div class="form-group"><label>PHONE</label><input id="em-phone"></div>
    <div class="form-group"><label>EMERGENCY CONTACT</label><input id="em-emergency"></div>
    <div class="section-header">LOG EVENT</div>
    <div class="form-row">
      <div class="form-group">
        <label>EVENT TYPE</label>
        <select id="em-event-type">
          <option value="">-- none --</option>
          <option value="start">Start</option><option value="aid_arrive">Aid Arrive</option>
          <option value="aid_depart">Aid Depart</option><option value="finish">Finish</option>
          <option value="dnf">DNF</option><option value="dns">DNS</option><option value="manual">Manual Note</option>
        </select>
      </div>
      <div class="form-group"><label>STATION</label><select id="em-event-station"></select></div>
    </div>
    <div class="form-group"><label>EVENT TIME (leave blank = now)</label><input id="em-event-time" placeholder="HH:MM:SS"></div>
    <div class="form-group"><label>NOTES</label><input id="em-notes" placeholder="Optional notes"></div>
    <div class="modal-footer">
      <button onclick="document.getElementById('edit-modal').classList.add('hidden')">CANCEL</button>
      <button class="primary" onclick="OP.saveParticipant()">SAVE</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="js/common.js"></script>
<script src="js/operator.js"></script>
</body>
</html>
