syntax = "proto3";
package meshtastic;

message ServiceEnvelope {
  MeshPacket packet    = 1;
  string     channel_id = 2;
  string     gateway_id = 3;
}

message MeshPacket {
  uint32 from      = 1;
  uint32 to        = 2;
  uint32 channel   = 3;
  oneof payload_variant {
    Data  decoded   = 4;
    bytes encrypted = 5;
  }
  uint32 id        = 6;
  uint32 rx_time   = 7;
  float  rx_snr    = 8;
  uint32 hop_limit = 9;
  bool   want_ack  = 10;
  uint32 priority  = 11;
  int32  rx_rssi   = 12;
  bool   via_mqtt  = 13;
  uint32 hop_start = 14;
}

message Data {
  uint32 portnum       = 1;
  bytes  payload       = 2;
  bool   want_response = 3;
  uint32 dest          = 4;
  uint32 source        = 5;
  uint32 request_id    = 6;
  uint32 reply_id      = 7;
  uint32 emoji         = 8;
}

message Position {
  int32  latitude_i             = 1;
  int32  longitude_i            = 2;
  int32  altitude               = 3;
  uint32 time                   = 4;
  uint32 location_source        = 5;
  uint32 altitude_source        = 6;
  uint32 timestamp              = 7;
  int32  timestamp_millis_adjust = 8;
  int32  altitude_hae           = 9;
  uint32 altitude_geoidal_separation = 10;
  uint32 PDOP                   = 11;
  uint32 HDOP                   = 12;
  uint32 VDOP                   = 13;
  uint32 gps_accuracy           = 14;
  uint32 ground_speed           = 15;
  uint32 ground_track           = 16;
  uint32 fix_quality            = 17;
  uint32 fix_type               = 18;
  uint32 sats_in_view           = 19;
  uint32 sensor_id              = 20;
  uint32 next_update            = 21;
  uint32 seq_number             = 22;
  int32  precision_bits         = 23;
}

message User {
  string id           = 1;
  string long_name    = 2;
  string short_name   = 3;
  bytes  macaddr      = 4;
  int32  hw_model     = 5;
  bool   is_licensed  = 6;
  int32  role         = 7;
}

message DeviceMetrics {
  uint32 battery_level      = 1;
  float  voltage            = 2;
  float  channel_utilization = 3;
  float  air_util_tx        = 4;
  uint32 uptime_seconds     = 5;
}

message EnvironmentMetrics {
  float  temperature       = 1;
  float  relative_humidity = 2;
  float  barometric_pressure = 3;
  float  gas_resistance    = 4;
  float  voltage           = 5;
  float  current           = 6;
  uint32 iaq               = 7;
}

message Telemetry {
  uint32             time               = 1;
  DeviceMetrics      device_metrics     = 2;
  EnvironmentMetrics environment_metrics = 3;
}
