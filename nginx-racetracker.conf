# RaceTracker nginx config
# Install: sudo cp nginx-racetracker.conf /etc/nginx/sites-available/racetracker
#          sudo ln -s /etc/nginx/sites-available/racetracker /etc/nginx/sites-enabled/racetracker
#
# If you already have a server block for apps.k7swi.org, copy only the
# location blocks into that file and omit the server wrapper.
# SSL is added by certbot (see setup.sh).

server {
    listen 80;
    listen [::]:80;
    server_name apps.k7swi.org;

    location /RaceTracker/ {
        # Strip /RaceTracker prefix so Node.js serves from /
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;

        # Allow large KML/GPX/CSV uploads
        client_max_body_size 50m;

        # WebSocket upgrade
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Keep long-lived connections (WebSocket, SSE)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }
}
